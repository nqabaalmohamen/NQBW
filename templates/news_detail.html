{% extends 'base.html' %}

{% block title %}{{ news_item.title }} - البوابة الخدمية{% endblock %}

{% block content %}
<div style="padding-top: 40px; background: white;"></div>

<!-- Article Content -->
<section class="section-padding" style="background: white;">
    <div style="width: 100%; padding: 0 5%;">
        
        <!-- Main Content (No Sidebar) -->
        <div style="background: white; padding: 20px 0;">
            
            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border-color); padding-bottom: 15px; margin-bottom: 30px;">
                <h1 style="font-size: 2.2rem; font-weight: 800; color: var(--primary-dark); margin: 0; line-height: 1.4;">{{ news_item.title }}</h1>
            </div>
            
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; color: var(--text-muted); font-size: 0.95rem;">
                <span><i class="fa-regular fa-calendar" style="color: var(--gold);"></i> تاريخ النشر: {{ news_item.date|date:"d M Y" }}</span>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <span style="font-weight: 600;">تواصل معنا:</span>
                    <a href="https://www.facebook.com/profile.php?id=61583287921147&locale=ar_AR" target="_blank" style="color: #1877f2; font-size: 1.2rem;"><i class="fa-brands fa-facebook-f"></i></a>
                    <a href="https://wa.me/201095043989" target="_blank" style="color: #25d366; font-size: 1.2rem;"><i class="fa-brands fa-whatsapp"></i></a>
                </div>
            </div>

            <div style="font-size: 1.15rem; line-height: 2; color: #333; font-family: 'Cairo', sans-serif; font-weight: 500; text-align: justify; padding-bottom: 30px;">
                {% if news_item.image %}
                <div style="text-align: center; margin-bottom: 35px; background: #f8f9fa; border-radius: var(--radius-md); padding: 10px; border: 1px solid #eee;">
                    <img src="{{ news_item.image.url }}" alt="{{ news_item.title }}" style="max-width: 100%; height: auto; max-height: 500px; object-fit: contain; border-radius: var(--radius-sm);">
                </div>
                {% endif %}
                
                {{ news_item.content|linebreaks }}
            </div>
            
        </div>
    </div>
</section>

<!-- Add hover effect for sidebar items -->
<style>
    a[href^="/news/"]:hover {
        transform: translateY(-3px);
        box-shadow: var(--shadow-md) !important;
    }
</style>

{% endblock %}
