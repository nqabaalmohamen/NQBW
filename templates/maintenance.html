<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الموقع قيد التطوير | البوابة الرقمية</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #004b87;
            --primary-dark: #002c52;
            --gold: #d4af37;
            --gold-dark: #aa8c2c;
            --white: #ffffff;
            --bg-color: #f8f9fa;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }
        body {
            background-color: var(--primary-dark);
            color: var(--white);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            overflow: hidden;
            position: relative;
        }
        /* Background Pattern */
        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(circle at 15% 50%, rgba(212, 175, 55, 0.08) 0%, transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(0, 75, 135, 0.3) 0%, transparent 50%);
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 800px;
            padding: 40px 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .logo-icon {
            font-size: 5rem;
            color: var(--gold);
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--white);
        }
        p {
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        /* Countdown Timer */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .time-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 20px;
            border-radius: 15px;
            min-width: 110px;
        }
        .time-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--gold);
            display: block;
            margin-bottom: 5px;
        }
        .time-label {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
        }
        .admin-login {
            margin-top: 50px;
            display: inline-block;
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .admin-login:hover {
            color: var(--gold);
        }

        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            p { font-size: 1rem; }
            .time-box { min-width: 80px; padding: 15px; }
            .time-value { font-size: 1.8rem; }
            .time-label { font-size: 0.8rem; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <div class="container">
        <i class="fa-solid fa-screwdriver-wrench logo-icon"></i>
        <h1>نعمل على تطوير الموقع</h1>
        <p>عذراً، البوابة الرقمية لنقابة المحامين تخضع لبعض التحديثات التقنية والصيانة الدورية لتحسين مستوى الخدمة. سنعود للعمل قريباً جداً.</p>
        
        {% if settings.maintenance_end_date %}
        <div class="countdown" id="countdown">
            <div class="time-box">
                <span class="time-value" id="days">00</span>
                <span class="time-label">يوم</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="hours">00</span>
                <span class="time-label">ساعة</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="minutes">00</span>
                <span class="time-label">دقيقة</span>
            </div>
            <div class="time-box">
                <span class="time-value" id="seconds">00</span>
                <span class="time-label">ثانية</span>
            </div>
        </div>

        <script>
            // Parse Django datetime to JS
            const endDateString = "{{ settings.maintenance_end_date|date:'c' }}";
            const countDownDate = new Date(endDateString).getTime();

            const x = setInterval(function() {
                const now = new Date().getTime();
                const distance = countDownDate - now;

                if (distance < 0) {
                    clearInterval(x);
                    document.getElementById("countdown").innerHTML = "<h3 style='color: var(--gold);'>اكتمل التحديث! جاري تهيئة الموقع...</h3>";
                    setTimeout(() => location.reload(), 5000); // reload after 5s
                    return;
                }

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById("days").innerHTML = days < 10 ? '0' + days : days;
                document.getElementById("hours").innerHTML = hours < 10 ? '0' + hours : hours;
                document.getElementById("minutes").innerHTML = minutes < 10 ? '0' + minutes : minutes;
                document.getElementById("seconds").innerHTML = seconds < 10 ? '0' + seconds : seconds;
            }, 1000);
        </script>
        {% endif %}

        <a href="/dashboard/login/" class="admin-login"><i class="fa-solid fa-lock"></i> دخول المسؤولين</a>
    </div>
</body>
</html>
