{% extends 'dashboard/base.html' %}

{% block title %}إضافة خبر | لوحة التحكم{% endblock %}
{% block page_title %}إضافة خبر/إعلان جديد{% endblock %}

{% block content %}
<div class="card" style="max-width: 700px; margin: 0 auto;">
    <h3 style="margin-top: 0; color: var(--primary); margin-bottom: 20px;">بيانات الخبر</h3>
    
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        
        <div style="margin-bottom: 15px;">
            <label class="form-label">عنوان الخبر أو الإعلان <span style="color:red;">*</span></label>
            <input type="text" name="title" class="form-control" required placeholder="مثال: إعلان هام بخصوص الدفعة الجديدة">
        </div>

        <div style="margin-bottom: 15px;">
            <label class="form-label">تفاصيل / نص الخبر</label>
            <textarea name="description" class="form-control" rows="4" placeholder="اكتب تفاصيل الخبر هنا..."></textarea>
        </div>

        <div style="margin-bottom: 15px;">
            <label class="form-label">تاريخ الخبر</label>
            <input type="date" name="lecture_date" class="form-control">
        </div>

        <div style="margin-bottom: 15px;">
            <label class="form-label">صورة الخبر (اختياري)</label>
            <input type="file" name="image" class="form-control" accept="image/*">
            <small style="color:var(--text-muted);">يمكنك رفع صورة خاصة بالخبر إذا أردت</small>
        </div>

        <div style="display: flex; gap: 10px; margin-top: 20px;">
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-save"></i> حفظ ونشر الخبر</button>
            <a href="{% url 'core:dashboard_institute' %}" class="btn btn-secondary">إلغاء</a>
        </div>
    </form>
</div>
{% endblock %}
