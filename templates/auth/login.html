{% extends 'base.html' %}
{% block title %}تسجيل الدخول - البوابة الخدمية{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="form-card">
        <div style="text-align:center; margin-bottom: 30px;">
            <i class="fa-solid fa-user-lock" style="font-size: 3rem; color: var(--primary); margin-bottom:15px;"></i>
            <h2 style="color: var(--primary-dark);">تسجيل الدخول للبوابة</h2>
            <p style="color: var(--text-muted);">أدخل بيانات حسابك للوصول إلى الخدمات</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">رقم الهاتف المحمول <span style="color:red;">*</span></label>
                <input type="text" name="username" class="form-control" maxlength="11" pattern="\d{11}" title="يجب أن يتكون من 11 رقم" required autofocus placeholder="أدخل رقم الهاتف...">
            </div>
            <div class="form-group">
                <label class="form-label">كلمة المرور</label>
                <input type="password" name="password" class="form-control" required placeholder="أدخل كلمة المرور...">
            </div>
            
            <button type="submit" class="btn-submit">تسجيل الدخول</button>
        </form>

        <div style="text-align:center; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border-color);">
            <p>ليس لديك حساب على البوابة؟ <a href="{% url 'core:register' %}" style="font-weight:700;">إنشاء حساب جديد</a></p>
        </div>
    </div>
</div>
{% endblock %}
