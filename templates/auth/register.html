{% extends 'base.html' %}
{% block title %}إنشاء حساب - البوابة الخدمية{% endblock %}

{% block extra_css %}
<style>
    .register-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .register-full { grid-column: 1 / -1; }
    @media (max-width: 768px) {
        .register-grid { grid-template-columns: 1fr; gap: 15px; }
        .register-full { grid-column: 1 / -1; }
    }
</style>
{% endblock %}

{% block content %}
<div class="container section-padding">
    <div class="form-card" style="max-width: 800px;">
        <div style="text-align:center; margin-bottom: 30px;">
            <i class="fa-solid fa-user-plus" style="font-size: 3rem; color: var(--primary); margin-bottom:15px;"></i>
            <h2 style="color: var(--primary-dark);">إنشاء حساب جديد</h2>
            <p style="color: var(--text-muted);">للوصول إلى الخدمات النقابية والقانونية المخصصة لك</p>
        </div>

        <form method="POST">
            {% csrf_token %}
            
            <div class="register-grid">
                <div class="form-group register-full">
                    <label class="form-label">الاسم رباعي <span style="color:red;">*</span></label>
                    <input type="text" name="full_name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">الرقم القومي (14 رقم) <span style="color:red;">*</span></label>
                    <input type="text" name="national_id" class="form-control" maxlength="14" pattern="\d{14}" title="يجب أن يتكون من 14 رقم" required>
                </div>
                <div class="form-group">
                    <label class="form-label">رقم الهاتف المحمول (11 رقم) <span style="color:red;">*</span></label>
                    <input type="tel" name="phone" class="form-control" maxlength="11" pattern="\d{11}" title="يجب أن يتكون من 11 رقم" required>
                </div>

                <div class="form-group register-full">
                    <label class="form-label">صفة المستخدم <span style="color:red;">*</span></label>
                    <select name="user_type" id="user_type_select" class="form-control" onchange="toggleSyndicateField()" required>
                        <option value="citizen">مواطن طالب خدمة</option>
                        <option value="lawyer">محامٍ مقيد بالنقابة</option>
                    </select>
                </div>

                <div class="form-group register-full" id="syndicate_group" style="display: none;">
                    <label class="form-label">رقم القيد (6 أرقام كحد أقصى) <span style="color:red;">*</span></label>
                    <input type="text" name="syndicate_id" id="syndicate_id_input" class="form-control" maxlength="6" pattern="\d{1,6}" title="رقم القيد يجب أن يكون أرقاماً فقط (حد أقصى 6)">
                </div>

                <div class="form-group">
                    <label class="form-label">كلمة المرور <span style="color:red;">*</span></label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label class="form-label">تأكيد كلمة المرور <span style="color:red;">*</span></label>
                    <input type="password" name="password2" class="form-control" required>
                </div>
            </div>
            
            <button type="submit" class="btn-submit" style="margin-top: 20px;">إنشاء الحساب الآن</button>
            
            <script>
                function toggleSyndicateField() {
                    const typeSelect = document.getElementById('user_type_select');
                    const syndicateGroup = document.getElementById('syndicate_group');
                    const syndicateInput = document.getElementById('syndicate_id_input');
                    if (typeSelect.value === 'lawyer') {
                        syndicateGroup.style.display = 'block';
                        syndicateInput.required = true;
                    } else {
                        syndicateGroup.style.display = 'none';
                        syndicateInput.required = false;
                        syndicateInput.value = '';
                    }
                }
                // Run on load
                toggleSyndicateField();
            </script>
        </form>

        <div style="text-align:center; margin-top: 25px; padding-top: 20px; border-top: 1px solid var(--border-color);">
            <p>لديك حساب بالفعل؟ <a href="{% url 'core:login' %}" style="font-weight:700;">تسجيل الدخول</a></p>
        </div>
    </div>
</div>
{% endblock %}
